name: Elixir CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

env:
  ELIXIR_VERSION: "1.18.4"
  OTP_VERSION: "28.0.2_1"
  IMAGE_OS: ubuntu22

jobs:
  credo:
    name: Credo
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile dependencies
        run: mix deps.compile

      - name: Run Credo
        run: mix credo

      - name: Write job summary
        if: success()
        run: |
          {
            echo "## Credo"
            echo
            echo "- Status: passed"
            echo "- Command: \`mix credo\`"
          } >> "$GITHUB_STEP_SUMMARY"

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Restore PLT cache
        uses: actions/cache@v3
        with:
          path: _build/dev/dialyxir_*.plt*
          key: ${{ runner.os }}-plt-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-plt-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile dependencies
        run: mix deps.compile

      - name: Run Dialyzer
        run: mix dialyzer

      - name: Write job summary
        if: success()
        run: |
          {
            echo "## Dialyzer"
            echo
            echo "- Status: passed"
            echo "- Command: \`mix dialyzer\`"
          } >> "$GITHUB_STEP_SUMMARY"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile dependencies
        run: mix deps.compile

      - name: Run Coverage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: MIX_ENV=test mix coveralls.github --umbrella

      - name: Write job summary
        if: success()
        run: |
          {
            echo "## Coverage"
            echo
            echo "- Status: passed"
            echo "- Command: \`MIX_ENV=test mix coveralls.github --umbrella\`"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile dependencies
        run: mix deps.compile

      - name: Run tests
        run: mix test --cover

      - name: Write job summary
        if: success()
        run: |
          {
            echo "## Tests"
            echo
            echo "- Status: passed"
            echo "- Command: \`mix test --cover\`"
          } >> "$GITHUB_STEP_SUMMARY"

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [credo, dialyzer, coverage, test]

    steps:
      - name: Write workflow summary
        run: |
          {
            echo "# Elixir CI Summary"
            echo
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| Credo | ${{ needs.credo.result }} |"
            echo "| Dialyzer | ${{ needs.dialyzer.result }} |"
            echo "| Coverage | ${{ needs.coverage.result }} |"
            echo "| Test | ${{ needs.test.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update pull request quality report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          CREDO_RESULT: ${{ needs.credo.result }}
          DIALYZER_RESULT: ${{ needs.dialyzer.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          TEST_RESULT: ${{ needs.test.result }}
        with:
          script: |
            const marker = '<!-- elixir-ci-report -->'
            const emojiFor = (result) => {
              switch (result) {
                case 'success':
                  return '✅'
                case 'failure':
                  return '❌'
                case 'cancelled':
                  return '⚪'
                default:
                  return '🟡'
              }
            }

            const checks = [
              ['Credo', process.env.CREDO_RESULT],
              ['Dialyzer', process.env.DIALYZER_RESULT],
              ['Coverage', process.env.COVERAGE_RESULT],
              ['Test', process.env.TEST_RESULT]
            ]

            const body = [
              marker,
              '## Elixir CI Report',
              '',
              '| Check | Result |',
              '| --- | --- |',
              ...checks.map(([name, result]) => `| ${name} | ${emojiFor(result)} ${result} |`),
              '',
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n')

            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            })

            const existing = comments.find((comment) => comment.body?.includes(marker))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              })
            }
